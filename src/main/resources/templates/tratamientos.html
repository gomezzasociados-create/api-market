<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - Linda Mamá Spa</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --violeta-profundo: #100118;
            --violeta-tarjeta: rgba(28, 2, 41, 0.9);
            --fucsia-neon: #ff00ff;
            --fucsia-brillo: rgba(255, 0, 255, 0.8);
            --cyan-neon: #00e5ff;
            --blanco-puro: #ffffff;
            --texto-muted: #e0e0e0;
        }

        body {
            background-color: var(--violeta-profundo);
            background-image: url('/spa-fondo.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--blanco-puro);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        h1.titulo-principal {
            font-family: 'Playfair Display', serif; font-weight: 900; color: #ffffff; text-transform: uppercase; letter-spacing: 3px;
            text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff, 0 0 40px #ff007f, 0 0 80px #ff007f; margin-top: 30px; margin-bottom: 5px;
        }

        .subtitulo-neon {
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 1.2rem;
            color: var(--cyan-neon);
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-top: 0;
            margin-bottom: 20px;
            text-shadow: 0 0 5px var(--cyan-neon), 0 0 15px rgba(0, 229, 255, 0.8);
        }

        .titulo-categoria {
            font-size: 2.2rem; margin-top: 40px; margin-bottom: 30px; font-weight: 800; color: var(--cyan-neon);
            text-shadow: 0 0 15px rgba(0, 229, 255, 0.8), 0 0 30px rgba(0, 229, 255, 0.4); text-transform: uppercase; letter-spacing: 1.5px;
            border-bottom: 2px solid var(--cyan-neon); padding-bottom: 10px; display: inline-block;
            background: rgba(0,0,0,0.4); padding: 10px 20px; border-radius: 10px;
        }

        header { text-align: center; padding: 50px 20px; background: radial-gradient(circle, rgba(42, 3, 66, 0.8) 0%, rgba(16, 1, 24, 0.95) 70%); position: relative; }
        .img-logo { max-width: 160px; position: relative; z-index: 5; animation: contornoNeon 5s infinite alternate; }

        @keyframes contornoNeon {
            0% { filter: drop-shadow(0 0 15px #ff00ff); }
            50% { filter: drop-shadow(0 0 25px #00e5ff); }
            100% { filter: drop-shadow(0 0 15px #ff1493); }
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        .grid-catalogo {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
            align-items: start;
        }

        .card-servicio {
            background-color: var(--violeta-tarjeta);
            backdrop-filter: blur(8px);
            border-radius: 15px; overflow: hidden; border: 2px solid rgba(255,0,255,0.3);
            transition: transform 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease; display: flex; flex-direction: column; cursor: pointer; position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .card-servicio:hover { transform: translateY(-10px) scale(1.03); border-color: var(--fucsia-neon); box-shadow: 0 0 30px 10px rgba(255, 0, 255, 0.6); z-index: 10;}

        .card-img-container { width: 100%; height: 200px; overflow: hidden; position: relative; }
        .img-servicio { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .card-servicio:hover .img-servicio { transform: scale(1.15); }

        .card-body { padding: 20px; display: flex; flex-direction: column; flex-grow: 1; }
        .card-title { font-size: 1.2rem; margin: 0 0 15px; font-weight: 700; text-shadow: 1px 1px 3px rgba(0,0,0,0.8);}
        .card-precio { font-size: 1.8rem; font-weight: 800; color: var(--cyan-neon); margin: 0 0 20px; text-shadow: 0 0 15px var(--cyan-neon); letter-spacing: -1px; }

        .card-description-collapse {
            display: none; font-size: 0.9rem; color: var(--texto-muted); line-height: 1.6; padding: 0 20px 20px 20px;
            background-color: transparent; white-space: pre-line;
            animation: fadeIn 0.4s ease-in-out;
        }
        .card-description-collapse.show { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .btn-spa {
            background: linear-gradient(135deg, var(--fucsia-neon) 0%, #7d12ff 100%); color: white; border: none; font-weight: 800;
            padding: 15px 25px; border-radius: 10px; width: 100%; cursor: pointer; transition: 0.3s ease; text-transform: uppercase; letter-spacing: 1.5px; font-size: 0.9rem; box-shadow: 0 4px 15px rgba(255, 0, 255, 0.4);
            margin-top: auto; position: relative; overflow: hidden;
        }
        .btn-spa:hover { box-shadow: 0 0 25px 5px var(--cyan-neon); transform: translateY(-3px); background: linear-gradient(135deg, var(--cyan-neon) 0%, #7d12ff 100%); color: white;}

        .efecto-waooo {
            animation: estallidoNeon 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: #00e5ff !important;
            color: black !important;
            box-shadow: 0 0 40px #00e5ff, inset 0 0 10px white !important;
        }

        @keyframes estallidoNeon {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); box-shadow: 0 0 50px #00e5ff; }
            100% { transform: scale(1); }
        }

        /* Botón Play/Pause Principal */
        #btn-musica {
            position: fixed; bottom: 20px; left: 20px; z-index: 1000;
            background: rgba(28, 2, 41, 0.9); border: 2px solid var(--fucsia-neon);
            border-radius: 50%; width: 60px; height: 60px; font-size: 1.8rem;
            color: var(--fucsia-neon); cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.6); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #btn-musica:hover { box-shadow: 0 0 35px var(--cyan-neon); transform: scale(1.15) rotate(10deg); border-color: var(--cyan-neon); color: var(--cyan-neon);}
        .music-paused { opacity: 0.6; box-shadow: none !important; filter: grayscale(100%); border-color: gray !important;}

        /* Botón Siguiente Canción */
        #btn-siguiente {
            position: fixed; bottom: 90px; left: 28px; z-index: 1000;
            background: rgba(28, 2, 41, 0.9); border: 2px solid var(--cyan-neon);
            border-radius: 50%; width: 45px; height: 45px; font-size: 1.2rem;
            color: var(--cyan-neon); cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.4); transition: 0.3s ease;
        }
        #btn-siguiente:hover { box-shadow: 0 0 25px var(--cyan-neon); transform: scale(1.15); background: var(--cyan-neon); color: black;}

        #carrito-flotante {
            position: fixed; top: 20px; right: 20px; width: 400px; max-height: 90vh; overflow-y: auto; z-index: 1000;
            display: none; border-radius: 15px; background-color: rgba(16, 1, 24, 0.95); border: 2px solid var(--cyan-neon); box-shadow: 0 0 30px 8px rgba(0, 229, 255, 0.3); backdrop-filter: blur(15px);
            transition: all 0.3s ease;
        }
        .carrito-animado { animation: reboteCarrito 0.5s ease; border-color: var(--fucsia-neon) !important; box-shadow: 0 0 40px var(--fucsia-neon) !important;}

        @keyframes reboteCarrito {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .cart-title { font-size: 1.6rem; margin: 0; font-weight: 800; text-shadow: 0 0 10px rgba(255,255,255,0.5);}
        .cart-badge { font-size: 1.3rem; padding: 8px 15px; background: #00e5ff; color: #000 !important; font-weight: 900 !important; border-radius: 50px; box-shadow: 0 0 15px #00e5ff;}
        .cart-item-name { font-size: 1.1rem; color: #fff; font-weight: 600; }
        .cart-item-price { font-size: 1.3rem; color: var(--cyan-neon); font-weight: 800; }
        .cart-total-text { font-size: 1.8rem; font-weight: 800; color: #fff; }
        .cart-btn-agendar { font-size: 1.2rem; padding: 18px; border-radius: 12px; }

        @media (max-width: 768px) {
            h1.titulo-principal { font-size: 2rem !important; }
            .subtitulo-neon { font-size: 1rem; letter-spacing: 3px; }
            .titulo-categoria { font-size: 1.5rem; text-align: center; display: block; }
            .grid-catalogo { grid-template-columns: 1fr; gap: 20px; }
            header { padding: 30px 10px; }
            #carrito-flotante { top: auto; bottom: 0; right: 0; width: 100%; border-radius: 20px 20px 0 0; max-height: 70vh; }
            #btn-musica { bottom: 90px; left: 15px; }
            #btn-siguiente { bottom: 160px; left: 22px; }
        }
    </style>
</head>
<body>

<audio id="spaAudio" autoplay th:src="@{/spa-music.mp3}"></audio>

<audio id="sfx-add" preload="auto" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_7314742eaf.mp3?filename=magic-strike-6098.mp3"></audio>
<audio id="sfx-open" preload="auto" src="https://cdn.pixabay.com/download/audio/2022/03/10/audio_c8c8a73467.mp3?filename=bubble-sound-43207.mp3"></audio>
<audio id="sfx-delete" preload="auto" src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_0625c1539c.mp3?filename=error-126627.mp3"></audio>

<button id="btn-musica" class="music-paused" title="Reproducir/Pausar Música">🔇</button>
<button id="btn-siguiente" title="Siguiente Canción">⏭️</button>

<header>
    <div class="logo-container">
        <img src="https://res.cloudinary.com/doi0o3hlr/image/upload/v1774235486/Gemini_Generated_Image_nk1ek1nk1ek1nk1e_-_Editado_u6nqd4.png" class="img-logo" alt="Logo Linda Mamá Spa">
    </div>
    <h1 class="titulo-principal" style="font-size: 3rem;">Catálogo Linda Mamá Spa</h1>
    <h3 class="subtitulo-neon">con visión de futuro</h3>
</header>

<div class="container">

    <h2 class="titulo-categoria">Packs VIP (Método Crys 7T)</h2>
    <div class="grid-catalogo">
        <div th:each="pack : ${packs}" th:if="${pack.nombre != null and #strings.containsIgnoreCase(pack.nombre, 'Pack')}" class="card-packs-wrapper">
            <div class="card-servicio">
                <div class="card-img-container" onclick="toggleDescription(this)">
                    <img th:src="${pack.imagen}" class="img-servicio" alt="Imagen Pack VIP">
                </div>
                <div class="card-body">
                    <h4 class="card-title Poppins" th:text="${pack.nombre}">Nombre</h4>
                    <div class="mt-auto">
                        <p class="card-precio Poppins">$<span th:text="${pack.precio != null ? #numbers.formatDecimal(pack.precio, 0, 'COMMA', 0, 'POINT') : '0'}">0</span></p>
                        <button class="btn-spa Poppins btn-agregar" th:attr="data-nombre=${pack.nombre}, data-precio=${pack.precio}">Añadir a Reserva</button>
                    </div>
                </div>
                <div class="card-description-collapse Poppins" th:text="${pack.descripcion}">Descripción colapsada...</div>
            </div>
        </div>
    </div>

    <h2 class="titulo-categoria">Sesiones Individuales</h2>
    <div class="grid-catalogo">
        <div th:each="pack : ${packs}" th:unless="${pack.nombre != null and #strings.containsIgnoreCase(pack.nombre, 'Pack')}" class="card-servicio-wrapper">
            <div class="card-servicio">
                <div class="card-img-container" onclick="toggleDescription(this)">
                    <img th:src="${pack.imagen}" class="img-servicio" alt="Imagen Sesión">
                </div>
                <div class="card-body">
                    <h4 class="card-title Poppins" th:text="${pack.nombre}">Nombre</h4>
                    <div class="mt-auto">
                        <p class="card-precio Poppins">$<span th:text="${pack.precio != null ? #numbers.formatDecimal(pack.precio, 0, 'COMMA', 0, 'POINT') : '0'}">0</span></p>
                        <button class="btn-spa Poppins btn-agregar" th:attr="data-nombre=${pack.nombre}, data-precio=${pack.precio}">Añadir a Reserva</button>
                    </div>
                </div>
                <div class="card-description-collapse Poppins" th:text="${pack.descripcion}">Descripción colapsada...</div>
            </div>
        </div>
    </div>

</div>

<div id="carrito-flotante">
    <div style="background: linear-gradient(90deg, var(--fucsia-neon) 0%, var(--cyan-neon) 100%); padding: 20px; display: flex; justify-content: space-between; align-items: center; border-top-left-radius: 12px; border-top-right-radius: 12px;">
        <h5 class="cart-title text-white Poppins">✨ Tu Reserva</h5>
        <span class="cart-badge text-white Poppins" id="contador-carrito">0</span>
    </div>
    <div style="padding: 20px;">
        <ul id="lista-carrito" style="list-style: none; padding: 0; margin-bottom: 25px;"></ul>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
            <span class="cart-total-text Poppins">Total:</span>
            <span class="cart-total-text Poppins" style="color: var(--cyan-neon); text-shadow: 0 0 15px var(--cyan-neon);">$<span id="total-carrito">0</span></span>
        </div>
        <button id="btn-agendar" class="btn-spa cart-btn-agendar w-100 Poppins" style="box-shadow: 0 0 20px var(--fucsia-brillo);">📅 Reservar Ahora</button>
    </div>
</div>

<script>
    // --- LÓGICA DE AUDIO Y PLAYLIST ---
    const bgMusic = document.getElementById('spaAudio');
    const btnMusica = document.getElementById('btn-musica');
    const btnSiguiente = document.getElementById('btn-siguiente');

    const sfxAdd = document.getElementById('sfx-add');
    const sfxOpen = document.getElementById('sfx-open');
    const sfxDelete = document.getElementById('sfx-delete');

    bgMusic.volume = 0.4;
    sfxAdd.volume = 0.8;
    sfxOpen.volume = 0.6;
    sfxDelete.volume = 0.5;

    // Tu Playlist
    const playlist = [
        '/spa-music.mp3',
        '/spa-music2.mp3',
        '/spa-music3.mp3',
        '/spa-music4.mp3'
    ];
    let cancionActualIndex = 0;
    let musicaIniciada = false;

    // Función para cambiar de canción
    function reproducirSiguienteCancion() {
        cancionActualIndex++;
        if (cancionActualIndex >= playlist.length) {
            cancionActualIndex = 0; // Vuelve a empezar si se acaba la lista
        }
        bgMusic.src = playlist[cancionActualIndex];
        bgMusic.play().then(() => {
            btnMusica.classList.remove('music-paused');
            btnMusica.innerText = '🔊';
            musicaIniciada = true;
        }).catch(err => console.log("Error cambiando canción", err));
    }

    // El navegador avisa automáticamente cuando la canción termina
    bgMusic.addEventListener('ended', reproducirSiguienteCancion);

    // Si el usuario presiona el botón "Siguiente"
    btnSiguiente.addEventListener('click', (e) => {
        e.stopPropagation();
        reproducirSiguienteCancion();
    });

    // Arranque inicial liberado (Autoplay)
    window.addEventListener('load', () => {
        bgMusic.play().then(() => {
            btnMusica.classList.remove('music-paused');
            btnMusica.innerText = '🔊';
            musicaIniciada = true;
        }).catch(() => {
            ['click', 'touchstart', 'keydown'].forEach(evt =>
                document.body.addEventListener(evt, intentarAutoplay, { once: true })
            );
        });
    });

    function intentarAutoplay() {
        if (!musicaIniciada && bgMusic.paused) {
            bgMusic.play().then(() => {
                btnMusica.classList.remove('music-paused');
                btnMusica.innerText = '🔊';
                musicaIniciada = true;
            }).catch(e => console.log("Navegador esperando confirmación manual..."));
        }
    }

    // Botón de Play / Pausa general
    btnMusica.addEventListener('click', (e) => {
        e.stopPropagation();
        if (bgMusic.paused) {
            bgMusic.play();
            btnMusica.classList.remove('music-paused');
            btnMusica.innerText = '🔊';
            musicaIniciada = true;
        } else {
            bgMusic.pause();
            btnMusica.classList.add('music-paused');
            btnMusica.innerText = '🔇';
        }
    });

    // --- CARRITO Y EFECTOS ACORDEÓN / WAOOO ---
    let carrito = JSON.parse(localStorage.getItem('spaCarrito')) || [];

    function toggleDescription(element) {
        sfxOpen.currentTime = 0; sfxOpen.play().catch(()=>{});

        const cardTarget = element.closest('.card-servicio');
        const descTarget = cardTarget.querySelector('.card-description-collapse');

        document.querySelectorAll('.card-description-collapse.show').forEach(desc => {
            if (desc !== descTarget) {
                desc.classList.remove('show');
            }
        });

        descTarget.classList.toggle('show');
    }

    function actualizarCarritoUI() {
        const lista = document.getElementById('lista-carrito');
        const totalSpan = document.getElementById('total-carrito');
        const contador = document.getElementById('contador-carrito');
        const carritoUI = document.getElementById('carrito-flotante');

        lista.innerHTML = ''; let total = 0;

        if (carrito.length === 0) { carritoUI.style.display = 'none'; }
        else {
            carritoUI.style.display = 'block';
            carrito.forEach((item, index) => {
                total += parseFloat(item.precio);
                lista.innerHTML += `
                    <li style="display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px dashed rgba(0, 229, 255, 0.3);">
                        <span class="cart-item-name Poppins" style="flex: 1; padding-right: 15px;">${item.nombre}</span>
                        <div style="display: flex; align-items: center;">
                            <span class="cart-item-price Poppins me-3" style="color: #fff; text-shadow: none;">$${Number(item.precio).toLocaleString('es-CL')}</span>
                            <button class="btn" style="background: var(--fucsia-neon); color: white; border-radius: 50%; width: 35px; height: 35px; font-weight: bold; box-shadow: 0 0 10px var(--fucsia-neon); border: none; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; padding: 0;" onclick="eliminarDelCarrito(${index})">×</button>
                        </div>
                    </li>`;
            });
        }
        totalSpan.innerText = total.toLocaleString('es-CL');
        contador.innerText = carrito.length;
        localStorage.setItem('spaCarrito', JSON.stringify(carrito));
    }

    document.querySelectorAll('.btn-agregar').forEach(btn => {
        btn.addEventListener('click', function(e) {
            e.stopPropagation();

            sfxAdd.currentTime = 0; sfxAdd.play().catch(()=>{});

            const item = { nombre: this.getAttribute('data-nombre'), precio: this.getAttribute('data-precio') };
            carrito.push(item); actualizarCarritoUI();

            this.classList.add('efecto-waooo');
            const textoOriginal = this.innerText;
            this.innerText = "¡MÁGICO! ✨";

            const carritoUI = document.getElementById('carrito-flotante');
            carritoUI.classList.remove('carrito-animado');
            void carritoUI.offsetWidth;
            carritoUI.classList.add('carrito-animado');

            setTimeout(() => {
                this.classList.remove('efecto-waooo');
                this.innerText = textoOriginal;
                carritoUI.classList.remove('carrito-animado');
            }, 800);
        });
    });

    window.eliminarDelCarrito = function(index) {
        sfxDelete.currentTime = 0; sfxDelete.play().catch(()=>{});
        carrito.splice(index, 1);
        actualizarCarritoUI();
    };

    document.getElementById('btn-agendar').addEventListener('click', () => {
        window.location.href = '/agenda';
    });

    actualizarCarritoUI();
</script>
</body>
</html>
