<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOMEZ MARKET - Acceso Restringido</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --bg-dark: #050205;
            --neon-blue: #00f0ff;
            --neon-purple: #ff003c;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-color: transparent; /* let tech-bg show */
        }
        
        #tech-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url('https://images.unsplash.com/photo-1555664424-778a1e5e1b48?q=80&w=1920&auto=format&fit=crop');
            background-size: cover; background-position: center;
            z-index: -2; opacity: 0.5;
            filter: brightness(0.6) contrast(1.4) saturate(2) sepia(0.2);
        }
        #tech-bg::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.3), rgba(0,0,0,0.3) 1px, transparent 1px, transparent 3px);
            z-index: 1; pointer-events: none;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5), 0 0 20px rgba(0, 210, 255, 0.2);
            text-align: center;
        }

        .logo-neon {
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .pin-box {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            letter-spacing: 15px;
            border-radius: 10px;
            padding: 10px;
            transition: all 0.3s;
        }

        .pin-box:focus {
            outline: none;
            box-shadow: 0 0 15px var(--neon-blue);
            border-color: #fff;
            color: #fff;
        }

        .btn-neon {
            background: transparent;
            border: 2px solid var(--neon-purple);
            color: var(--neon-purple);
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            padding: 12px 30px;
            transition: all 0.3s;
            width: 100%;
            margin-top: 20px;
        }

        .btn-neon:hover {
            background: var(--neon-purple);
            color: #fff;
            box-shadow: 0 0 25px var(--neon-purple);
        }
    </style>
</head>
<body>

    <div id="tech-bg"></div>

    <div class="auth-card">
        <h1 class="logo-neon"><i class="bi bi-fingerprint"></i> GOMEZ MKT</h1>
        <p class="text-muted mb-4">Acceso Segurizado</p>
        
        <div th:if="${error}" class="alert alert-danger bg-transparent border-danger text-danger fw-bold" role="alert" th:text="${error}">
        </div>

        <form action="/login" method="POST">
            <div class="mb-4">
                <input type="password" name="pin" class="form-control pin-box" maxlength="4" placeholder="----" autocomplete="off" autofocus required>
            </div>
            
            <button type="submit" class="btn btn-neon">DESBLOQUEAR TÉRMINAL <i class="bi bi-unlock-fill ms-2"></i></button>
        </form>

        <div class="mt-4 pt-4 border-top border-secondary text-muted small">
            <p class="mb-0">🔑 Admin: 9876 | 🛒 Cajero: 1234</p>
        </div>
    </div>

</body>
</html>
