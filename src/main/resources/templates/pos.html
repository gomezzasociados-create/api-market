<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linda Mamá Spa - POS Neón</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root { --violeta-profundo: #100118; --violeta-tarjeta: #1c0229; --fucsia-neon: #ff00ff; --cyan-neon: #00e5ff; --blanco-puro: #ffffff; --verde-neon: #00ff00; --naranja-neon: #ff9900;}
        body { background-color: var(--violeta-profundo); color: var(--blanco-puro); font-family: 'Poppins', sans-serif; overflow-x: hidden; }

        /* EFECTOS WAOOO Y ANIMACIONES */
        .efecto-waooo { animation: estallidoNeon 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); background: var(--cyan-neon) !important; color: black !important; box-shadow: 0 0 40px var(--cyan-neon), inset 0 0 10px white !important; border-color: var(--cyan-neon) !important; }
        @keyframes estallidoNeon { 0% { transform: scale(1); } 50% { transform: scale(1.1); box-shadow: 0 0 50px var(--cyan-neon); } 100% { transform: scale(1); } }
        @keyframes latido { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.05); } 100% { opacity: 1; transform: scale(1); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 50% { transform: translateX(10px); } 75% { transform: translateX(-10px); } }
        .shake-error { animation: shake 0.4s ease-in-out; border-color: red !important; box-shadow: 0 0 30px rgba(255,0,0,0.8) !important; }

        /* PANTALLA DE LOGIN */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--violeta-profundo); z-index: 10000; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        .login-box { background: rgba(28, 2, 41, 0.9); border: 2px solid var(--cyan-neon); padding: 40px; border-radius: 20px; text-align: center; width: 90%; max-width: 420px; box-shadow: 0 0 30px rgba(0,229,255,0.2); transition: 0.3s; }
        .pin-input { background: #100118; color: var(--fucsia-neon); font-size: 2.5rem; text-align: center; letter-spacing: 20px; border: 1px solid var(--fucsia-neon); border-radius: 10px; width: 100%; margin-bottom: 20px; padding: 10px; font-weight: bold;}
        .pin-input:focus { outline: none; box-shadow: 0 0 15px rgba(255,0,255,0.5); }

        /* PANTALLA DE BIENVENIDA VIP */
        #welcome-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(42, 3, 66, 0.95) 0%, rgba(16, 1, 24, 1) 100%); z-index: 10005; display: none; justify-content: center; align-items: center; flex-direction: column; }
        .welcome-text { font-family: 'Playfair Display', serif; font-size: 3.5rem; color: #fff; text-align: center; text-shadow: 0 0 20px var(--fucsia-neon), 0 0 40px var(--cyan-neon); animation: zoomInBounce 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .welcome-sub { color: var(--cyan-neon); font-family: 'Poppins'; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; margin-top: 15px; animation: latido 1.5s infinite; }
        @keyframes zoomInBounce { 0% { transform: scale(0); opacity: 0; } 80% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }

        /* HEADER POS */
        #app-pos { display: none; animation: fadeIn 1s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .navbar-cyber { background: rgba(28, 2, 41, 0.95); border-bottom: 2px solid var(--cyan-neon); box-shadow: 0 0 20px rgba(0, 229, 255, 0.3); backdrop-filter: blur(10px); margin-bottom: 20px;}
        .navbar-brand { font-family: 'Playfair Display', serif; font-weight: 900; color: var(--blanco-puro) !important; text-shadow: 0 0 10px var(--cyan-neon); letter-spacing: 1px; }

        .pos-container { height: calc(100vh - 80px); padding: 0 20px; }
        .contenedor-servicios { max-height: 75vh; overflow-y: auto; overflow-x: hidden; padding-right: 10px; }

        /* Tarjetas de Tratamiento con Oferta */
        .card-servicio {
            background: linear-gradient(145deg, var(--violeta-tarjeta), #2a0342); border: 1px solid rgba(0, 229, 255, 0.2);
            border-radius: 15px; cursor: pointer; transition: all 0.3s ease-in-out; height: 150px; display: flex;
            flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); position: relative; overflow: hidden;
        }
        .card-servicio:hover, .card-servicio:active { border-color: var(--cyan-neon); transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0, 229, 255, 0.4); background: #2a0342; }
        .card-servicio h5 { font-size: 0.9rem; font-weight: 600; margin-bottom: 5px; color: var(--blanco-puro); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; z-index: 2;}
        .card-servicio .precio { color: var(--cyan-neon); font-weight: 800; font-size: 1.2rem; text-shadow: 0 0 10px rgba(0,229,255,0.3); z-index: 2;}

        .etiqueta-promo { position: absolute; top: 10px; right: -30px; background: var(--fucsia-neon); color: white; font-weight: 900; font-size: 0.7rem; padding: 3px 30px; transform: rotate(45deg); box-shadow: 0 0 10px var(--fucsia-neon); letter-spacing: 1px; z-index: 1;}
        .precio-viejo { font-size: 0.8rem; color: #888; text-decoration: line-through; display: block; margin-bottom: -5px;}
        .precio-oferta { color: var(--fucsia-neon) !important; font-size: 1.4rem !important; text-shadow: 0 0 15px var(--fucsia-neon) !important; }

        /* Barra Lateral del Carrito */
        .carrito { background: rgba(28, 2, 41, 0.85); backdrop-filter: blur(15px); border-radius: 20px; padding: 25px; height: 85vh; border: 1px solid var(--fucsia-neon); box-shadow: 0 0 30px rgba(255, 0, 255, 0.15); position: sticky; top: 20px; display: flex; flex-direction: column; }
        .btn-fucsia { background: var(--fucsia-neon); border: none; color: white; font-weight: 800; transition: 0.3s; box-shadow: 0 4px 15px rgba(255,0,255,0.3); letter-spacing: 1px;}
        .btn-fucsia:hover, .btn-fucsia:active { transform: scale(1.02); box-shadow: 0 6px 20px rgba(255,0,255,0.6); background: #d000d0; color: white;}
        .item-carrito { display: flex; justify-content: space-between; border-bottom: 1px dashed rgba(255,0,255,0.3); padding: 12px 0; font-size: 0.95rem; animation: fadeIn 0.3s ease-in-out;}

        #lista-busqueda { position: absolute; z-index: 1000; width: 100%; background: var(--violeta-tarjeta); border: 1px solid var(--cyan-neon); border-top: none; border-radius: 0 0 10px 10px; box-shadow: 0 5px 15px rgba(0,229,255,0.2); }
        .cliente-opcion { padding: 12px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.1); transition: 0.2s;}
        .cliente-opcion:hover { background: rgba(0,229,255,0.2); color: var(--cyan-neon); padding-left: 18px;}

        .input-dark { background-color: #100118; border: 1px solid rgba(255,255,255,0.2); color: white; }
        .input-dark:focus { background-color: #100118; color: white; border-color: var(--fucsia-neon); box-shadow: 0 0 10px rgba(255,0,255,0.4); }
        .input-dark:disabled { background-color: rgba(255,255,255,0.05); color: #888; border-color: transparent; }

        /* Botones de Método de Pago Neón */
        .pay-btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .pay-btn { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 10px; border-radius: 10px; cursor: pointer; text-align: center; transition: 0.3s; font-size: 0.85rem; font-weight: 600; display: flex; flex-direction: column; align-items: center; justify-content: center;}
        .pay-btn i { font-size: 1.5rem; margin-bottom: 5px; }

        .pay-btn input { display: none; }
        .pay-btn:has(input:checked) { transform: translateY(-3px); }

        .pay-efectivo:has(input:checked) { border-color: var(--verde-neon); background: rgba(0, 255, 0, 0.1); color: var(--verde-neon); box-shadow: 0 0 15px rgba(0, 255, 0, 0.4); }
        .pay-tarjeta:has(input:checked) { border-color: var(--cyan-neon); background: rgba(0, 229, 255, 0.1); color: var(--cyan-neon); box-shadow: 0 0 15px rgba(0, 229, 255, 0.4); }
        .pay-transfer:has(input:checked) { border-color: var(--fucsia-neon); background: rgba(255, 0, 255, 0.1); color: var(--fucsia-neon); box-shadow: 0 0 15px rgba(255, 0, 255, 0.4); }
        .pay-mercadopago:has(input:checked) { border-color: var(--naranja-neon); background: rgba(255, 153, 0, 0.1); color: var(--naranja-neon); box-shadow: 0 0 15px rgba(255, 153, 0, 0.4); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--violeta-profundo); }
        ::-webkit-scrollbar-thumb { background: var(--cyan-neon); border-radius: 10px; }

        @media (max-width: 768px) {
            body { padding-bottom: 20px; }
            .pos-container { height: auto; padding: 10px; }
            .contenedor-servicios { max-height: 40vh; border-bottom: 1px solid var(--fucsia-neon); padding-bottom: 15px; }
            .card-servicio { height: auto; min-height: 120px; padding: 8px; }
            .card-servicio h5 { font-size: 0.85rem; }
            .card-servicio .precio { font-size: 1rem; }
            .carrito { height: auto; position: relative; top: 0; margin-top: 20px; padding: 15px; }
            #items-pos { max-height: 200px; }
            .welcome-text { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

<audio id="sfx-login-ok" preload="auto" src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_bb630cc098.mp3?filename=success-1-6297.mp3"></audio>
<audio id="sfx-login-fail" preload="auto" src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_0625c1539c.mp3?filename=error-126627.mp3"></audio>
<audio id="sfx-waooo" preload="auto" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_7314742eaf.mp3?filename=magic-strike-6098.mp3"></audio>
<audio id="sfx-click" preload="auto" src="https://cdn.pixabay.com/download/audio/2022/03/10/audio_c8c8a73467.mp3?filename=bubble-sound-43207.mp3"></audio>
<audio id="sfx-delete" preload="auto" src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_0625c1539c.mp3?filename=error-126627.mp3"></audio>

<div id="login-screen">
    <div class="login-box" id="login-box">
        <h2 class="fw-bold mb-1" style="color: var(--cyan-neon); font-family: 'Playfair Display';"><i class="bi bi-cart-check-fill"></i> Caja POS</h2>
        <p class="text-white mb-4 opacity-75">Control de Venta Directa</p>
        <input type="password" id="input-pin" class="pin-input" maxlength="4" placeholder="••••" onkeypress="if(event.key === 'Enter') validarAcceso(event)">
        <button class="btn btn-fucsia w-100 py-3 fs-5 mt-2" onclick="validarAcceso(event)">ABRIR TURNO</button>
    </div>
</div>

<div id="welcome-screen">
    <i class="bi bi-calculator" style="font-size: 5rem; color: var(--cyan-neon); animation: latido 1.5s infinite;"></i>
    <h1 class="welcome-text" id="welcome-message">¡Bienvenida!</h1>
    <p class="welcome-sub">Preparando Caja Registradora...</p>
</div>

<div id="app-pos">
    <nav class="navbar navbar-expand navbar-cyber">
        <div class="container-fluid px-3 px-md-4">
            <a class="navbar-brand m-0" href="/admin"><i class="bi bi-stars me-1"></i>Linda Mamá <span class="text-white fw-light fs-6 ms-2 d-none d-md-inline">| Punto de Venta</span></a>
            <div class="d-flex align-items-center">
                <span class="badge border border-info text-info p-2 fs-6" id="badge-vendedor" style="background: rgba(0,229,255,0.1);"><i class="bi bi-person-circle"></i> Cargando...</span>
                <a href="/admin" class="btn btn-sm btn-outline-light ms-3"><i class="bi bi-arrow-left-circle"></i> Volver</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid pos-container">
        <div class="row">
            <div class="col-md-7 col-lg-8 px-2 px-md-4 position-relative">

                <div class="position-relative mb-4">
                    <label class="form-label text-info small fw-bold"><i class="bi bi-search"></i> BUSCAR SERVICIO O CLIENTA</label>
                    <div class="input-group">
                        <span class="input-group-text border-info text-info" style="background: var(--violeta-tarjeta);"><i class="bi bi-search"></i></span>
                        <input type="text" id="input-buscador" class="form-control input-dark border-info" placeholder="Escribe el nombre de la clienta o servicio..." onkeyup="buscarMixto()">
                    </div>
                    <div id="lista-busqueda"></div>
                </div>

                <div class="row contenedor-servicios pe-2 mx-0" id="grid-servicios">
                    <div class="col-6 col-md-6 col-lg-4 mb-3 px-2 item-grid-servicio" th:each="s : ${servicios}" th:data-nombre-lower="${#strings.toLowerCase(s.nombre)}">
                        <div class="card card-servicio" th:classappend="${s.isPromoActiva()} ? 'border-warning' : ''"
                             th:data-id="${s.id}" th:data-nombre="${s.nombre}"
                             th:data-precio="${s.isPromoActiva() ? s.precioPromo : s.precio}"
                             onclick="capturarServicio(event, this)">

                            <th:block th:if="${s.isPromoActiva()}">
                                <div class="etiqueta-promo">OFERTA</div>
                            </th:block>

                            <h5 th:text="${s.nombre}">Tratamiento</h5>

                            <div class="precio mt-auto" th:classappend="${s.isPromoActiva()} ? 'precio-oferta' : ''">
                                <span th:if="${s.isPromoActiva()}" class="precio-viejo" th:text="'$' + ${#numbers.formatInteger(s.precio, 0, 'POINT')}"></span>
                                $<span th:text="${s.isPromoActiva() ? #numbers.formatInteger(s.precioPromo, 0, 'POINT') : #numbers.formatInteger(s.precio, 0, 'POINT')}">$0</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-5 col-lg-4 mt-3 mt-md-0">
                <div class="carrito">

                    <div class="d-flex justify-content-between align-items-center mb-3 border-bottom border-secondary pb-2">
                        <h5 class="mb-0 fw-bold" style="color: var(--fucsia-neon);"><i class="bi bi-cart-check-fill"></i> Resumen de Venta</h5>
                        <button class="btn btn-sm btn-outline-danger py-0 px-2" onclick="limpiarCliente()" id="btn-limpiar" style="display:none; font-size: 0.75rem;"><i class="bi bi-x-circle"></i> Soltar Clienta</button>
                    </div>

                    <div class="p-3 mb-3 border border-secondary rounded" style="background: rgba(255,255,255,0.02);">
                        <div class="mb-2 position-relative">
                            <label class="form-label small fw-bold mb-1" style="color: var(--cyan-neon);">NOMBRE DE CLIENTA <span class="text-danger">*</span></label>
                            <input type="text" id="cliente-nombre" class="form-control form-control-sm input-dark" placeholder="Ej: María Gómez">
                        </div>
                        <div class="row g-2">
                            <div class="col-6">
                                <label class="form-label small fw-bold mb-1" style="color: var(--cyan-neon);">WHATSAPP</label>
                                <input type="text" id="cliente-telefono" class="form-control form-control-sm input-dark" placeholder="+569...">
                            </div>
                            <div class="col-6">
                                <label class="form-label small fw-bold mb-1" style="color: var(--cyan-neon);">CORREO</label>
                                <input type="email" id="cliente-correo" class="form-control form-control-sm input-dark" placeholder="@">
                            </div>
                        </div>
                        <input type="hidden" id="cliente-id" value="">
                    </div>

                    <div class="mb-2">
                        <label class="form-label small fw-bold mb-1" style="color: var(--cyan-neon);">FECHA DE CITA (MANUAL)</label>
                        <input type="datetime-local" id="fecha-servicio" class="form-control form-control-sm input-dark text-info">
                    </div>

                    <div id="items-pos" class="mt-2 mb-2" style="flex-grow: 1; overflow-y: auto;">
                        <div class="text-center text-muted small mt-4 opacity-50">
                            <i class="bi bi-hand-index-thumb fs-1 d-block mb-2"></i>
                            Toca los servicios a la izquierda<br>para agregarlos al carrito
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mt-auto pt-2 border-top border-secondary mb-3">
                        <span class="h6 mb-0 fw-bold text-white">TOTAL A COBRAR</span>
                        <span id="total-final" class="h2 mb-0" style="color: var(--cyan-neon); font-weight: 900; text-shadow: 0 0 15px rgba(0,229,255,0.4);">$0</span>
                    </div>

                    <div class="pay-btn-group">
                        <label class="pay-btn pay-efectivo">
                            <input type="radio" name="metodoPago" value="EFECTIVO" checked>
                            <i class="bi bi-cash-stack"></i> Caja Efectivo
                        </label>
                        <label class="pay-btn pay-tarjeta">
                            <input type="radio" name="metodoPago" value="TARJETA">
                            <i class="bi bi-credit-card-2-front"></i> Datafono / POS
                        </label>
                        <label class="pay-btn pay-transfer">
                            <input type="radio" name="metodoPago" value="TRANSFERENCIA">
                            <i class="bi bi-bank"></i> Transferencia
                        </label>
                        <label class="pay-btn pay-mercadopago">
                            <input type="radio" name="metodoPago" value="MERCADO_PAGO">
                            <i class="bi bi-link-45deg"></i> Link MP
                        </label>
                    </div>

                    <button class="btn btn-fucsia w-100 py-3 rounded text-uppercase fs-5 mt-2" id="btn-procesar" onclick="confirmarVenta(event)">
                        <i class="bi bi-check2-circle me-1"></i> Procesar Venta
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- EFECTOS DE SONIDO GLOBALES ---
    const sfxOk = document.getElementById('sfx-login-ok');
    const sfxFail = document.getElementById('sfx-login-fail');
    const sfxWaooo = document.getElementById('sfx-waooo');
    const sfxClick = document.getElementById('sfx-click');
    const sfxDelete = document.getElementById('sfx-delete');

    function activarEfectoWaooo(elementoTarget) {
        if(elementoTarget) {
            elementoTarget.classList.add('efecto-waooo');
            setTimeout(() => elementoTarget.classList.remove('efecto-waooo'), 600);
        }
        sfxWaooo.currentTime = 0; sfxWaooo.play().catch(()=>{});
    }

    // --- LÓGICA DE CAJERO Y SEGURIDAD ---
    let vendedorActual = 'Caja General';

    function validarAcceso(event) {
        const pin = document.getElementById('input-pin').value.trim();

        if (pin === '7777') { vendedorActual = "Crisley Paredes"; }
        else if (pin === '1010') { vendedorActual = "Janneth"; }
        else if (pin === '2020') { vendedorActual = "Daniela Camacho"; }
        else if (pin === '3030') { vendedorActual = "Daniela Montaño"; }
        else {
            sfxFail.currentTime = 0; sfxFail.play().catch(()=>{});
            const loginBox = document.getElementById('login-box');
            loginBox.classList.add('shake-error');
            setTimeout(() => loginBox.classList.remove('shake-error'), 400);
            return;
        }

        sfxOk.currentTime = 0; sfxOk.play().catch(()=>{});
        localStorage.setItem('spa_usuario', vendedorActual);

        document.getElementById('login-screen').style.display = 'none';
        const welcomeScreen = document.getElementById('welcome-screen');
        welcomeScreen.style.display = 'flex';

        const primerNombre = vendedorActual.split(' ')[0];
        document.getElementById('welcome-message').innerText = "¡Bienvenida " + primerNombre + "!";

        if ('speechSynthesis' in window) {
            const mensajeVoz = new SpeechSynthesisUtterance("Bienvenida " + primerNombre + ". Iniciando sistema de caja.");
            mensajeVoz.lang = 'es-ES';
            mensajeVoz.rate = 1.0;
            window.speechSynthesis.speak(mensajeVoz);
        }

        setTimeout(() => {
            sfxWaooo.currentTime = 0; sfxWaooo.play().catch(()=>{});
            welcomeScreen.style.display = 'none';
            document.getElementById('app-pos').style.display = 'block';
            document.getElementById('badge-vendedor').innerHTML = `<i class="bi bi-person-badge"></i> Atiende: ${vendedorActual}`;

            const ahora = new Date();
            ahora.setMinutes(ahora.getMinutes() - ahora.getTimezoneOffset());
            document.getElementById('fecha-servicio').value = ahora.toISOString().slice(0,16);
        }, 2500);
    }

    // --- LÓGICA DEL CARRITO Y CLIENTES ---
    let carrito = [];

    function buscarMixto() {
        const query = document.getElementById('input-buscador').value.toLowerCase();

        // 1. Filtrar Servicios en la grilla visual
        const itemsGrid = document.querySelectorAll('.item-grid-servicio');
        itemsGrid.forEach(item => {
            const nombreServicio = item.getAttribute('data-nombre-lower');
            if(query === '' || nombreServicio.includes(query)) {
                item.style.display = 'block';
            } else {
                item.style.display = 'none';
            }
        });

        // 2. Buscar Clientes en BD
        if (query.length < 3) { document.getElementById('lista-busqueda').innerHTML = ''; return; }

        fetch(`/api/pos/buscar-cliente?query=${query}`)
            .then(res => res.json())
            .then(data => {
                let html = '';
                data.forEach(c => {
                    html += `<div class="cliente-opcion" onclick="seleccionarCliente(${c.id}, '${c.nombre}', '${c.telefono || ''}', '${c.correo || ''}')">
                                <i class="bi bi-person-check text-info me-2"></i><strong>${c.nombre}</strong> <br>
                                <small class="text-muted ms-4">${c.telefono || 'Sin teléfono'}</small>
                             </div>`;
                });
                document.getElementById('lista-busqueda').innerHTML = html;
            })
            .catch(e => console.error("Error buscando:", e));
    }

    function seleccionarCliente(id, nombre, telefono, correo) {
        sfxClick.currentTime = 0; sfxClick.play().catch(()=>{});
        document.getElementById('cliente-id').value = id;
        document.getElementById('cliente-nombre').value = nombre;
        document.getElementById('cliente-telefono').value = telefono;
        document.getElementById('cliente-correo').value = correo;

        document.getElementById('cliente-nombre').disabled = true;
        document.getElementById('cliente-telefono').disabled = true;
        document.getElementById('cliente-correo').disabled = true;

        document.getElementById('lista-busqueda').innerHTML = '';
        document.getElementById('input-buscador').value = '';

        document.querySelectorAll('.item-grid-servicio').forEach(i => i.style.display = 'block');
        document.getElementById('btn-limpiar').style.display = 'block';
    }

    function limpiarCliente() {
        sfxDelete.currentTime = 0; sfxDelete.play().catch(()=>{});
        document.getElementById('cliente-id').value = "";
        document.getElementById('cliente-nombre').value = "";
        document.getElementById('cliente-telefono').value = "";
        document.getElementById('cliente-correo').value = "";

        document.getElementById('cliente-nombre').disabled = false;
        document.getElementById('cliente-telefono').disabled = false;
        document.getElementById('cliente-correo').disabled = false;

        document.getElementById('btn-limpiar').style.display = 'none';
    }

    function capturarServicio(event, elemento) {
        sfxClick.currentTime = 0; sfxClick.play().catch(()=>{});

        elemento.classList.add('efecto-waooo');
        setTimeout(() => elemento.classList.remove('efecto-waooo'), 300);

        const id = elemento.getAttribute('data-id');
        const nombre = elemento.getAttribute('data-nombre');
        const precio = parseInt(elemento.getAttribute('data-precio'));
        carrito.push({ id, nombre, precio });

        document.getElementById('input-buscador').value = '';
        document.querySelectorAll('.item-grid-servicio').forEach(i => i.style.display = 'block');

        renderizarCarrito();
    }

    function renderizarCarrito() {
        const div = document.getElementById('items-pos');
        if (carrito.length === 0) {
            div.innerHTML = '<div class="text-center text-muted small mt-4 opacity-50"><i class="bi bi-hand-index-thumb fs-1 d-block mb-2"></i>Toca los servicios a la izquierda<br>para agregarlos al carrito</div>';
            document.getElementById('total-final').innerText = "$0";
            return;
        }

        div.innerHTML = '';
        let total = 0;
        carrito.forEach((item, index) => {
            total += item.precio;
            div.innerHTML += `
                <div class="item-carrito align-items-center">
                    <span style="flex:1; color: var(--blanco-puro); font-weight:600;"><i class="bi bi-check2 text-info me-1"></i>${item.nombre}</span>
                    <span class="fw-bold mx-2" style="color: var(--fucsia-neon);">$${item.precio.toLocaleString('es-CL')}</span>
                    <button class="btn btn-sm btn-outline-danger border-0 p-1 lh-1" onclick="quitar(${index})" title="Quitar"><i class="bi bi-trash-fill"></i></button>
                </div>`;
        });
        document.getElementById('total-final').innerText = "$" + total.toLocaleString('es-CL');
    }

    function quitar(index) {
        sfxDelete.currentTime = 0; sfxDelete.play().catch(()=>{});
        carrito.splice(index, 1);
        renderizarCarrito();
    }

    function confirmarVenta(event) {
        if (carrito.length === 0) {
            sfxFail.currentTime = 0; sfxFail.play().catch(()=>{});
            return alert("⚠️ Agregue al menos un servicio al carrito.");
        }

        const nombreCliente = document.getElementById('cliente-nombre').value.trim();
        if (!nombreCliente) {
            sfxFail.currentTime = 0; sfxFail.play().catch(()=>{});
            return alert("⚠️ Debe ingresar el nombre de la clienta.");
        }

        const fecha = document.getElementById('fecha-servicio').value;
        if (!fecha) {
            sfxFail.currentTime = 0; sfxFail.play().catch(()=>{});
            return alert("⚠️ Seleccione una fecha para la cita.");
        }

        activarEfectoWaooo(event.currentTarget);

        const serviciosAgrupados = carrito.map(i => i.nombre).join(" + ");
        const nombreConFirma = `${serviciosAgrupados} [Cobró: ${vendedorActual}]`;
        const metodoPago = document.querySelector('input[name="metodoPago"]:checked').value;

        const venta = {
            clienteId: document.getElementById('cliente-id').value || null,
            nuevoClienteNombre: nombreCliente,
            nuevoClienteTelefono: document.getElementById('cliente-telefono').value.trim(),
            nuevoClienteCorreo: document.getElementById('cliente-correo').value.trim(),
            nombreTratamiento: nombreConFirma,
            totalPagado: carrito.reduce((sum, i) => sum + i.precio, 0),
            metodoPago: metodoPago,
            fechaHora: fecha,
            estado: metodoPago === 'MERCADO_PAGO' ? 'RESERVADO' : 'CONFIRMADO'
        };

        const btn = document.getElementById('btn-procesar');
        btn.disabled = true;
        btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span> Autorizando...`;

        setTimeout(() => {
            fetch('/api/pos/venta-directa', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(venta)
            })
            .then(res => res.text())
            .then(data => {
                if (data.startsWith('http')) {
                    window.location.href = data;
                } else {
                    alert("🎉 ¡Venta registrada exitosamente!");
                    location.reload();
                }
            })
            .catch(err => {
                sfxFail.currentTime = 0; sfxFail.play().catch(()=>{});
                alert("Ocurrió un error al procesar la venta. Revise su conexión.");
                btn.disabled = false;
                btn.innerHTML = `<i class="bi bi-check2-circle me-1"></i> Procesar Venta`;
                console.error(err);
            });
        }, 800);
    }
</script>

</body>
</html>
